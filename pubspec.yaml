name: gg_music_xml_player
description: Reads music XML files and plays out note events in real time.
version: 1.0.3
repository: https://github.com/inlavigo/gg_music_xml_player
publish_to: none

environment:
  sdk: ">=3.12.2 <4.0.0"
dependencies:
  collection: ^1.19.1
  fake_async: ^1.3.3
  gg_periodic_timer: ^1.0.5
  gg_timeline: ^1.0.5
  gg_time_controller: ^1.0.4
  gg_typedefs: ^1.1.4
  gg_value: ^1.6.3
  music_xml:
    # Replace by published version once PR is merged:
    # https://github.com/de-men/music_xml/pull/54 is merged
    git:
      url: git@github.com:de-men/music_xml.git
      ref: 1bc1f2d8334f0ab2d5bdd7189f2d577c7de3b3a3

dev_dependencies:
  args: ^2.7.0
  gg_capture_print: ^1.0.9
  lints: ^6.1.0
  mocktail: ^1.0.5
  test: ^1.31.2
